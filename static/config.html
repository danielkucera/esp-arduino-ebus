<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration</title>
    <link rel="stylesheet" href="common.css">
</head>

<body>
    <h1>Configuration</h1>
    <div class="controls">
        <button id="btnHome">Home</button>
        <button id="btnLoad">Load</button>
        <button id="btnSave" class="apply">Save</button>
        <button id="btnSaveFile">Save to File</button>
        <button id="btnLoadFile">Load from File</button>
        <input type="file" id="fileInput" accept=".json" style="display:none">
        <button id="btnRestart" class="danger">Restart to Apply Changes</button>
        <button id="btnReset" class="danger">Reset Config</button>
        <span id="status">...</span>
    </div>

    <fieldset>
        <legend>WiFi Credentials</legend>
        <div><label for="wifiSsid">WiFi SSID</label></div>
        <div><input id="wifiSsid" type="text" class="config"></div>
        <div><label for="wifiPassword">WiFi Password</label></div>
        <div><input id="wifiPassword" type="password" class="config"></div>
        <div style="margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px;">
            <button id="btnWifiScan" style="margin-right: 10px;">Scan Available Networks</button>
            <span id="scanStatus"></span>
        </div>
        <div id="wifiScanResults" style="display: none; margin-top: 15px;">
            <h3>Available Networks</h3>
            <table id="wifiTable" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr>
                        <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">SSID</th>
                        <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">BSSID</th>
                        <th style="border: 1px solid #ddd; padding: 8px; text-align: center;">Signal (dBm)</th>
                        <th style="border: 1px solid #ddd; padding: 8px; text-align: center;">Channel</th>
                        <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">Security</th>
                        <th style="border: 1px solid #ddd; padding: 8px; text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody id="wifiTableBody">
                </tbody>
            </table>
        </div>
    </fieldset>

    <fieldset>
        <legend>General</legend>
        <div><label for="thingName">Thing Name</label></div>
        <div><input id="thingName" type="text" class="config" value="esp-eBus"></div>
        <div><label for="apModePassword">AP Mode Password</label></div>
        <div><input id="apModePassword" type="password" class="config" value="ebusebus"></div>
    </fieldset>

    <fieldset>
        <legend>Connection</legend>
        <div><label><input id="staticIPEnabled" type="checkbox" class="config"> Static IP</label></div>
        <div><label for="ipAddress">IP Address</label></div>
        <div><input id="ipAddress" type="text" class="config"></div>
        <div><label for="gateway">Gateway</label></div>
        <div><input id="gateway" type="text" class="config"></div>
        <div><label for="netmask">Netmask</label></div>
        <div><input id="netmask" type="text" class="config"></div>
        <div><label for="dns1">DNS 1</label></div>
        <div><input id="dns1" type="text" class="config"></div>
        <div><label for="dns2">DNS 2</label></div>
        <div><input id="dns2" type="text" class="config"></div>
    </fieldset>

    <fieldset>
        <legend>Adapter</legend>
        <div><label for="pwmValue">PWM</label></div>
        <div><input id="pwmValue" type="number" min="1" max="255" step="1" class="config" value="130"></div>
        <div><label for="ebusAddress">eBUS Address (hex, e.g. ff)</label></div>
        <div><input id="ebusAddress" type="text" class="config" value="ff"></div>
        <div><label for="busisrWindow">Bus ISR Window (us)</label></div>
        <div><input id="busisrWindow" type="number" min="4250" max="4500" step="1" class="config"></div>
        <div><label for="busisrOffset">Bus ISR Offset (us)</label></div>
        <div><input id="busisrOffset" type="number" min="0" max="200" step="1" class="config"></div>
    </fieldset>

    <fieldset>
        <legend>SNTP</legend>
        <div><label><input id="sntpEnabled" type="checkbox" class="config"> SNTP Enabled</label></div>
        <div><label for="sntpServer">SNTP Server</label></div>
        <div><input id="sntpServer" type="text" class="config" value="pool.ntp.org"></div>
        <div><label for="sntpTimezone">SNTP Timezone</label></div>
        <div><input id="sntpTimezone" type="text" class="config" value="UTC0"></div>
    </fieldset>

    <fieldset>
        <legend>Schedule</legend>
        <div><label><input id="inquiryExistPrm" type="checkbox" class="config"> Inquiry Of Existence</label>
        </div>
        <div><label><input id="scanOnStartPrm" type="checkbox" class="config"> Scan On Startup</label></div>
        <div><label for="firstCmdAfterSt">First Command After Start (s)</label></div>
        <div><input id="firstCmdAfterSt" type="number" min="5" max="60" step="1" class="config" value="10"></div>
    </fieldset>

    <fieldset>
        <legend>MQTT</legend>
        <div><label><input id="mqttEnabled" type="checkbox" class="config"> MQTT Enabled</label></div>
        <div><label for="mqttServer">MQTT Server</label></div>
        <div><input id="mqttServer" type="text" class="config"></div>
        <div><label for="mqttUser">MQTT User</label></div>
        <div><input id="mqttUser" type="text" class="config"></div>
        <div><label for="mqttPass">MQTT Password</label></div>
        <div><input id="mqttPass" type="password" class="config"></div>
        <div><label><input id="mqttPublishCnt" type="checkbox" class="config"> Publish Counter</label></div>
        <div><label><input id="mqttPublishTmg" type="checkbox" class="config"> Publish Timing</label></div>
    </fieldset>

    <fieldset>
        <legend>Home Assistant</legend>
        <div><label><input id="haEnabledParam" type="checkbox" class="config"> Enabled</label></div>
    </fieldset>

    <script src="common.js"></script>
    <script>
        document.getElementById('btnHome').addEventListener('click', handleHome);
        document.getElementById('btnLoad').addEventListener('click', loadConfig);
        document.getElementById('btnSave').addEventListener('click', saveConfig);
        document.getElementById('btnSaveFile').addEventListener('click', saveConfigToFile);
        document.getElementById('btnLoadFile').addEventListener('click', () => document.getElementById('fileInput').click());
        document.getElementById('fileInput').addEventListener('change', loadConfigFromFile);
        document.getElementById('btnRestart').addEventListener('click', restartDevice);
        document.getElementById('btnReset').addEventListener('click', resetConfig);
        document.getElementById('btnWifiScan').addEventListener('click', scanWifiNetworks);

        function setField(id, value) {
            const el = document.getElementById(id);
            if (!el) {
                console.warn(`Field not found: ${id}`);
                return;
            }
            if (el.type === 'checkbox') {
                const v = String(value || '').toLowerCase();
                el.checked = v === 'true' || v === 'selected' || v === '1' || v === 'on';
            }
            else el.value = value === undefined || value === null ? '' : value;
        }

        function getField(id) {
            const el = document.getElementById(id);
            if (!el) return null;
            if (el.type === 'checkbox') return el.checked ? "true" : "false";
            return el.value.trim();
        }

        function resetFieldsToDefaultValues() {
            const elements = document.getElementsByClassName("config");
            for (const el of elements) {
                if (el.type === 'checkbox') {
                    el.checked = el.defaultChecked;
                } else {
                    el.value = el.defaultValue;
                }
            }
        }

        async function loadConfig() {
            setStatus('Loading...');
            resetFieldsToDefaultValues();
            try {
                const res = await fetch('/api/v1/config');
                if (!res.ok) throw new Error('Load failed');
                const cfg_obj = await res.json();
                const cfg = cfg_obj.config || {};

                for (const key in cfg) {
                    if (cfg.hasOwnProperty(key)) {
                        setField(key, cfg[key]);
                    }
                }
                setStatus('Loaded');
            } catch (err) {
                setStatus('Load failed');
                console.error(err);
            }
        }

        async function saveConfig() {
            const payload = {};

            setStatus('Saving...');
            const el = document.getElementsByClassName("config");

            for (const e of el) {
                payload[e.id] = getField(e.id);
            }
            
            try {
                const res = await fetch('/api/v1/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const text = await res.text();
                setStatus(res.ok ? text : `Error: ${text}`);
            } catch (err) {
                setStatus('Save failed');
                console.error(err);
            }
        }

        function saveConfigToFile() {
            const payload = {};
            const el = document.getElementsByClassName('config');
            for (const e of el) {
                payload[e.id] = getField(e.id);
            }
            const blob = new Blob([JSON.stringify({ config: payload }, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'config.json';
            a.click();
            URL.revokeObjectURL(url);
            setStatus('Saved to file');
        }

        async function loadConfigFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            event.target.value = '';
            setStatus('Loading from file...');
            try {
                const text = await file.text();
                const cfg_obj = JSON.parse(text);
                const cfg = cfg_obj.config || cfg_obj;
                resetFieldsToDefaultValues();
                for (const key in cfg) {
                    if (cfg.hasOwnProperty(key)) {
                        setField(key, cfg[key]);
                    }
                }
                setStatus('Loaded from file');
            } catch (err) {
                setStatus('Load from file failed');
                console.error(err);
            }
        }

        async function resetConfig() {
            if (!confirm('Reset all saved configuration values?')) return;
            setStatus('Resetting...');
            try {
                const res = await fetch('/api/v1/config/reset', { method: 'POST' });
                const text = await res.text();
                setStatus(res.ok ? text : `Error: ${text}`);
                if (res.ok) await loadConfig();
            } catch (err) {
                setStatus('Reset failed');
                console.error(err);
            }
        }

        async function restartDevice() {
            if (!confirm('Restart device now?')) return;
            setStatus('Restarting...');
            try {
                const res = await fetch('/restart');
                const text = await res.text();
                setStatus(res.ok ? text : `Error: ${text}`);
            } catch (err) {
                setStatus('Restart failed');
                console.error(err);
            }
        }

        async function scanWifiNetworks() {
            const scanStatusEl = document.getElementById('scanStatus');
            const resultsEl = document.getElementById('wifiScanResults');
            const tableBodyEl = document.getElementById('wifiTableBody');

            scanStatusEl.textContent = 'Scanning...';
            tableBodyEl.innerHTML = '';
            resultsEl.style.display = 'none';

            try {
                const res = await fetch('/api/v1/wifi/scan', { method: 'POST' });
                if (!res.ok) throw new Error('Scan failed');
                
                const networks = await res.json();
                
                if (!networks || networks.length === 0) {
                    scanStatusEl.textContent = 'No networks found';
                    return;
                }

                // Sort by RSSI (signal strength) descending
                networks.sort((a, b) => b.rssi - a.rssi);

                // Populate table
                networks.forEach(network => {
                    const row = document.createElement('tr');
                    
                    const ssidCell = document.createElement('td');
                    ssidCell.textContent = network.ssid || '(Hidden)';
                    ssidCell.style.border = '1px solid #ddd';
                    ssidCell.style.padding = '8px';
                    row.appendChild(ssidCell);

                    const bssidCell = document.createElement('td');
                    bssidCell.textContent = network.bssid;
                    bssidCell.style.border = '1px solid #ddd';
                    bssidCell.style.padding = '8px';
                    row.appendChild(bssidCell);

                    const rssiCell = document.createElement('td');
                    rssiCell.textContent = network.rssi;
                    rssiCell.style.border = '1px solid #ddd';
                    rssiCell.style.padding = '8px';
                    rssiCell.style.textAlign = 'center';
                    row.appendChild(rssiCell);

                    const channelCell = document.createElement('td');
                    channelCell.textContent = network.channel;
                    channelCell.style.border = '1px solid #ddd';
                    channelCell.style.padding = '8px';
                    channelCell.style.textAlign = 'center';
                    row.appendChild(channelCell);

                    const authCell = document.createElement('td');
                    authCell.textContent = network.authMode;
                    authCell.style.border = '1px solid #ddd';
                    authCell.style.padding = '8px';
                    row.appendChild(authCell);

                    const actionCell = document.createElement('td');
                    actionCell.style.border = '1px solid #ddd';
                    actionCell.style.padding = '8px';
                    actionCell.style.textAlign = 'center';
                    
                    const selectBtn = document.createElement('button');
                    selectBtn.textContent = 'Select';
                    selectBtn.style.padding = '4px 8px';
                    selectBtn.style.cursor = 'pointer';
                    selectBtn.onclick = () => {
                        document.getElementById('wifiSsid').value = network.ssid || '';
                        document.getElementById('wifiPassword').focus();
                        scanStatusEl.textContent = 'Network selected';
                    };
                    actionCell.appendChild(selectBtn);
                    row.appendChild(actionCell);

                    tableBodyEl.appendChild(row);
                });

                resultsEl.style.display = 'block';
                scanStatusEl.textContent = `Found ${networks.length} network(s)`;
            } catch (err) {
                console.error(err);
                scanStatusEl.textContent = 'Scan failed: ' + err.message;
            }
        }

        loadConfig();
    </script>
</body>

</html>
