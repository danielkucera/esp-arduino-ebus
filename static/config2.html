<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration V2</title>
    <link rel="stylesheet" href="common.css">
</head>

<body>
    <h1>Configuration V2</h1>
    <div class="controls">
        <button id="btnHome">Home</button>
        <button id="btnLoad">Load</button>
        <button id="btnSave" class="apply">Save</button>
        <span id="status">...</span>
    </div>

    <fieldset>
        <legend>Connection</legend>
        <div><label><input id="staticIP" type="checkbox"> Static IP</label></div>
        <div><input id="ipAddress" type="text" placeholder="IP address"></div>
        <div><input id="gateway" type="text" placeholder="Gateway"></div>
        <div><input id="netmask" type="text" placeholder="Netmask"></div>
    </fieldset>

    <fieldset>
        <legend>Adapter</legend>
        <div><input id="pwm" type="number" min="1" max="255" step="1" placeholder="PWM"></div>
    </fieldset>

    <fieldset>
        <legend>WiFi Credentials (IotWebConf)</legend>
        <div><input id="wifiSsid" type="text" placeholder="WiFi SSID"></div>
        <div><input id="wifiPassword" type="text" placeholder="WiFi Password"></div>
        <div><input id="apPassword" type="text" placeholder="AP Mode Password"></div>
    </fieldset>

    <script src="common.js"></script>
    <script>
        document.getElementById('btnHome').addEventListener('click', handleHome);
        document.getElementById('btnLoad').addEventListener('click', loadConfig);
        document.getElementById('btnSave').addEventListener('click', saveConfig);

        function setField(id, value) {
            const el = document.getElementById(id);
            if (!el) return;
            if (el.type === 'checkbox') el.checked = !!value;
            else el.value = value === undefined || value === null ? '' : value;
        }

        function getField(id) {
            const el = document.getElementById(id);
            if (!el) return null;
            if (el.type === 'checkbox') return el.checked;
            return el.value.trim();
        }

        async function loadConfig() {
            setStatus('Loading...');
            try {
                const res = await fetch('/api/v1/config2');
                if (!res.ok) throw new Error('Load failed');
                const cfg = await res.json();
                setField('staticIP', cfg.staticIP);
                setField('ipAddress', cfg.ipAddress);
                setField('gateway', cfg.gateway);
                setField('netmask', cfg.netmask);
                setField('pwm', cfg.pwm);
                setField('wifiSsid', cfg.wifiSsid);
                setField('wifiPassword', cfg.wifiPassword);
                setField('apPassword', cfg.apPassword);
                setStatus('Loaded');
            } catch (err) {
                setStatus('Load failed');
                console.error(err);
            }
        }

        async function saveConfig() {
            setStatus('Saving...');
            const payload = {
                staticIP: getField('staticIP'),
                ipAddress: getField('ipAddress'),
                gateway: getField('gateway'),
                netmask: getField('netmask'),
                pwm: getField('pwm'),
                wifiSsid: getField('wifiSsid'),
                wifiPassword: getField('wifiPassword'),
                apPassword: getField('apPassword'),
            };
            try {
                const res = await fetch('/api/v1/config2', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const text = await res.text();
                setStatus(res.ok ? text : `Error: ${text}`);
            } catch (err) {
                setStatus('Save failed');
                console.error(err);
            }
        }

        loadConfig();
    </script>
</body>

</html>
