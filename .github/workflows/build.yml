name: PlatformIO CI

on:
  push:
    branches:
      - master
    tags:
      - v[1-9]*
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Cache PlatformIO
      uses: actions/cache@v3
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}
    - name: Set up Python
      uses: actions/setup-python@v2
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio
    - name: Prepare release dir
      run: mkdir release
    - name: Build v5.x-internal
      run: pio run -e esp32-c3-internal ; cp .pio/build/esp32-c3-internal/firmware.bin release/firmware-HW_v5.x-internal-${GITHUB_SHA::6}.bin
    - name: Build v5.x
      run: pio run -e esp32-c3 ; cp .pio/build/esp32-c3/firmware.bin release/firmware-HW_v5.x-${GITHUB_SHA::6}.bin
    - name: Assemble v5.x fullflash
      run: ./fullflash.sh esp32-c3 firmware-fullflash-HW_v5.x.bin ; mv firmware-fullflash-HW_v5.x.bin release/firmware-fullflash-HW_v5.x-${GITHUB_SHA::6}.bin
    - name: Assemble v5.x-internal fullflash
      run: ./fullflash.sh esp32-c3-internal firmware-fullflash-HW_v5.x-internal.bin ; mv firmware-fullflash-HW_v5.x-internal.bin release/firmware-fullflash-HW_v5.x-internal-${GITHUB_SHA::6}.bin
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        path: release

  release-master:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4.1.7
      with:
        path: release
    - name: Delete existing master release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release delete master --repo "$GITHUB_REPOSITORY" --cleanup-tag -y || true
    - name: Create or update master release
      uses: ncipollo/release-action@v1
      with:
        body: |
          Automated rolling prerelease from master.
          Commit: ${{ github.sha }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        commit: ${{ github.sha }}
        removeArtifacts: true
        prerelease: true
        tag: master
        name: master
        artifacts: "release/artifact/*"

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4.1.7
      with:
        path: release
    - name: Create release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "release/artifact/*"

deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          # Your 'build' job uploads to a folder named 'release'
          # This will download it into a local 'tmp_artifacts' folder
          name: artifact
          path: tmp_artifacts

      - name: Organize Files
        run: |
          # Create the specific path: firmware/<commit>/
          # Using short SHA (first 6 chars) for the folder name
          DEST_DIR="firmware/${GITHUB_SHA::6}"
          mkdir -p "$DEST_DIR"
          
          # Move files from the download into the versioned folder
          cp -r tmp_artifacts/* "$DEST_DIR/"
          
          # Ensure CNAME exists so GitHub doesn't drop your custom domain
          echo "esp-ebus.gh.danman.eu" > CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: true # This keeps /firmware/<old-sha>/ from being deleted
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "Deploy firmware for ${GITHUB_SHA::6}"