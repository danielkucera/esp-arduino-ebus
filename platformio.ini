; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
framework = espidf
monitor_filters = esp32_exception_decoder
extra_scripts = pre:auto_firmware_version.py
board_build.sdkconfig_defaults = sdkconfig.defaults
lib_deps = 

build_flags =
    -DESP32=1
board_build.embed_txtfiles =
    static/root.html
    static/config.html
    static/status.html
    static/upgrade.html
    static/adc.html
    static/common.css
    static/common.js
    static/commands.html
    static/cron.html
    static/devices.html
    static/logs.html
    static/statistics.html
    static/values.html

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
board_build.partitions = min_spiffs.csv
build_flags =
    ${env.build_flags}
    -DRESET_PIN=20
    -DPWM_PIN=6

monitor_filters = esp32_exception_decoder
lib_deps = 
    ${env.lib_deps}

[env:esp32-c3-ota]
extends = env:esp32-c3
upload_port = esp-ebus.local
upload_protocol = espota

[env:esp32-c3-internal]
extends = env:esp32-c3

build_flags =
    ${env.build_flags}
    -DRESET_PIN=20
    -DPWM_PIN=6
    -DEBUS_INTERNAL=1

lib_deps = 
    ${env.lib_deps}
    https://github.com/yuhu-/ebus.git#f55a0be9d0fa000470462252ff205359887f5f06

[env:esp32-c3-internal-ota]
extends = env:esp32-c3-internal
upload_port = esp-ebus.local
upload_protocol = espota

[env:esp32-c3-internal-remote]
extends = env:esp32-c3-internal
extra_scripts =
    ${env.extra_scripts}
    upload_http_pio.py

upload_protocol = custom
upload_port = esp-ebus-remote.test # configured in hosts file
custom_upload_user = admin
custom_upload_password = ebusebus
